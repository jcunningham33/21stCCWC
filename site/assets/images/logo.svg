<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" role="img" aria-label="21st Century Christian Worship Center">
  <title>21st Century Christian Worship Center</title>
  <!-- Sun rays at top of cross -->
  <g stroke="#f5b800" stroke-width="14" stroke-linecap="round" fill="none">
    <line x1="300" y1="20"  x2="300" y2="80"/>
    <line x1="220" y1="50"  x2="245" y2="100"/>
    <line x1="380" y1="50"  x2="355" y2="100"/>
    <line x1="160" y1="110" x2="200" y2="140"/>
    <line x1="440" y1="110" x2="400" y2="140"/>
  </g>
  <!-- Brush-style blue cross -->
  <g fill="#1e40af">
    <path d="M260 110
             Q300 95 340 112
             L348 360
             Q352 470 332 530
             Q310 580 295 600
             Q280 575 270 530
             Q256 470 256 360 Z"/>
    <path d="M170 290
             Q230 270 300 278
             Q380 282 440 296
             Q455 314 442 332
             Q380 348 300 344
             Q230 348 178 332
             Q165 314 170 290 Z"/>
  </g>
  <!-- Wordmark: 21ST CENTURY -->
  <g font-family="Impact, 'Brush Script MT', cursive" font-weight="900" fill="#1c1c20">
    <text x="300" y="490" text-anchor="middle" font-size="92" letter-spacing="2"
          transform="rotate(-3 300 490)">21ST</text>
    <text x="300" y="580" text-anchor="middle" font-size="92" letter-spacing="2"
          transform="rotate(-3 300 580)">CENTURY</text>
    <text x="300" y="670" text-anchor="middle" font-size="42" letter-spacing="2">CHRISTIAN WORSHIP CENTER</text>
  </g>
</svg>
